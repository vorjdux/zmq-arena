<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <style>
      .text-zmq { font-family: 'Roboto Mono', 'Courier New', monospace; font-size: 80px; font-weight: 700; fill: #FFFFFF; }
      .text-arena { font-family: 'Roboto Mono', 'Courier New', monospace; font-size: 80px; font-weight: 900; fill: #FF003C; font-style: italic; }
      .text-sub { font-family: 'Roboto Mono', 'Courier New', monospace; font-size: 16px; font-weight: 500; fill: #8B949E; letter-spacing: 6px; }
      .ring { fill: none; stroke: #30363D; stroke-width: 4; stroke-linejoin: miter; }
      .ring-accent { fill: none; stroke: #FFFFFF; stroke-width: 4; }
    </style>
    
    <!-- Filtro para efeito de colisão/glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background (GitHub Dark Mode) -->
  <rect width="800" height="250" fill="#0D1117" rx="12" />

  <!-- Arena/Battleground Mark -->
  <g transform="translate(140, 125)">
    <!-- O Octógono (A Arena de Execução) -->
    <polygon class="ring" points="0,-85 60,-60 85,0 60,60 0,85 -60,60 -85,0 -60,-60" />
    
    <!-- Detalhes de contenção da arena (cantos de impacto) -->
    <path class="ring-accent" d="M -85,0 L -75,-25" />
    <path class="ring-accent" d="M 85,0 L 75,25" />

    <!-- Vetor de Ataque 1 (Azul - ex: io_uring / Rust) -->
    <polygon points="-90,-30 15,0 -90,30 -60,0" fill="#00F0FF" opacity="0.9" style="mix-blend-mode: screen;" />
    
    <!-- Vetor de Ataque 2 (Vermelho - ex: epoll / C++) -->
    <polygon points="90,-30 -15,0 90,30 60,0" fill="#FF003C" opacity="0.9" style="mix-blend-mode: screen;" />

    <!-- Ponto de Impacto (Colisão na CPU/Kernel) -->
    <polygon points="0,-20 5,-5 20,0 5,5 0,20 -5,5 -20,0 -5,-5" fill="#FFFFFF" filter="url(#glow)" />
    
    <!-- Fagulhas/Fragmentação da colisão -->
    <circle cx="-15" cy="-25" r="2" fill="#00F0FF" />
    <circle cx="20" cy="20" r="2" fill="#FF003C" />
    <circle cx="10" cy="-30" r="1.5" fill="#FFFFFF" />
    <circle cx="-10" cy="35" r="1.5" fill="#FFFFFF" />
  </g>

  <!-- Tipografia -->
  <text x="270" y="145" class="text-zmq">ZMQ</text>
  <text x="430" y="145" class="text-arena">ARENA</text>
  
  <text x="275" y="185" class="text-sub">ZMTP BENCHMARK BATTLEGROUND</text>
</svg>
