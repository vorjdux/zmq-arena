<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zmq-arena · overview</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<style>
  :root {
    --bg:#0f1216; --panel:#171b21; --panel2:#1d2229; --line:#2a313a;
    --fg:#e6e9ee; --muted:#9aa4b2; --accent:#4f9cf9; --warn:#f59e0b;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f6f7f9; --panel:#fff; --panel2:#f0f2f5; --line:#e2e6eb;
            --fg:#161a1e; --muted:#5b6573; --accent:#2563eb; --warn:#b45309; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:14px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
  header { padding:18px 24px 6px; display:flex; align-items:center;
    justify-content:space-between; gap:8px 24px; flex-wrap:wrap; }
  h1.logo { margin:0; line-height:0; flex:0 0 auto; }
  h1.logo img { height:104px; width:auto; max-width:100%; display:block; }
  .sub { color:var(--muted); flex:1 1 300px; text-align:right; min-width:0; }
  .sub code { color:var(--fg); }
  .topnav { display:flex; gap:2px; padding:0 24px; border-bottom:1px solid var(--line); }
  .topnav a { padding:9px 15px; color:var(--muted); text-decoration:none;
    border-bottom:2px solid transparent; font-size:14px; }
  .topnav a:hover { color:var(--fg); }
  .topnav a.active { color:var(--fg); border-bottom-color:var(--accent); font-weight:600; }
  .banner { margin:12px 24px 0; padding:8px 12px; border-radius:8px;
    background:color-mix(in srgb,var(--warn) 18%,transparent);
    border:1px solid var(--warn); font-size:13px; }
  .banner.hidden { display:none; }
  .controls { position:sticky; top:0; z-index:5; display:flex; flex-wrap:wrap;
    align-items:flex-end; gap:12px 16px; padding:12px 24px;
    background:color-mix(in srgb,var(--bg) 92%,transparent);
    backdrop-filter:blur(6px); border-bottom:1px solid var(--line); }
  .ctl { display:flex; flex-direction:column; gap:4px; }
  .ctl label { font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); }
  select { background:var(--panel); color:var(--fg); border:1px solid var(--line);
    border-radius:7px; padding:6px 9px; font-size:13px; }
  .seg { display:inline-flex; border:1px solid var(--line); border-radius:7px; overflow:hidden; }
  .seg button { background:var(--panel); color:var(--muted); border:0; padding:6px 11px;
    font-size:13px; cursor:pointer; }
  .seg button.on { background:var(--accent); color:#fff; }
  .toggle { display:inline-flex; align-items:center; gap:7px; cursor:pointer; user-select:none; font-size:13px; }
  .toggle input { accent-color:var(--accent); }
  .variants { padding:12px 24px 0; }
  .variants .head { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:8px; }
  .variants .head .ttl { font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); }
  .preset { background:var(--panel2); border:1px solid var(--line); color:var(--muted);
    border-radius:999px; padding:3px 11px; font-size:12px; cursor:pointer; }
  .preset:hover { color:var(--fg); }
  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line);
    border-radius:999px; padding:4px 11px 4px 9px; font-size:12.5px; cursor:pointer;
    background:var(--panel); user-select:none; opacity:.45; }
  .chip.on { opacity:1; }
  .chip .sw { width:11px; height:11px; border-radius:50%; }
  .chip small { color:var(--muted); }
  main { padding:14px 24px 8px; display:grid; gap:16px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .card h2 { margin:0 0 2px; font-size:15px; }
  .card .hint { color:var(--muted); font-size:12px; margin-bottom:8px; }
  table { width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums; }
  th,td { text-align:right; padding:6px 10px; border-bottom:1px solid var(--line); }
  th:first-child,td:first-child { text-align:left; }
  th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
  .sw2 { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:7px; vertical-align:middle; }
  td small { color:var(--muted); }
  .rank1 td { font-weight:600; }
  /* panels grid */
  #panels { padding:0 24px; display:grid; gap:14px;
    grid-template-columns:repeat(auto-fill, minmax(460px, 1fr)); }
  body.focus #panels { grid-template-columns:1fr; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  .panel > summary { list-style:none; cursor:pointer; padding:11px 14px;
    display:flex; align-items:baseline; gap:8px; }
  .panel > summary::-webkit-details-marker { display:none; }
  .panel > summary .pt { font-size:14px; font-weight:600; }
  .panel > summary .ps { font-size:12px; color:var(--muted); }
  .panel > summary .caret { margin-left:auto; color:var(--muted); font-size:12px; }
  .panel[open] > summary .caret { transform:rotate(90deg); }
  .panel .chart { width:100%; height:300px; padding:0 6px 10px; }
  .err { padding:24px; color:var(--warn); }
  footer { color:var(--muted); font-size:12px; text-align:center;
    padding:18px 24px 22px; background:var(--panel2); border-top:1px solid var(--line); margin-top:16px; }
  footer div { max-width:900px; margin:0 auto; }
  footer a { color:var(--accent); }
  a { color:var(--accent); }
  @media (max-width:640px){
    header,.controls,.variants,footer,#panels{ padding-left:14px; padding-right:14px; }
    main{ padding:10px 14px 4px; }
    .banner{ margin-left:14px; margin-right:14px; }
    .topnav{ padding:0 8px; }
    header{ justify-content:center; }
    h1.logo{ flex:1 1 100%; }
    h1.logo img{ width:100%; height:auto; }
    .sub{ flex-basis:100%; text-align:center; }
    #panels{ grid-template-columns:1fr; }
    .card{ overflow-x:auto; }
  }
</style>
</head>
<body>
<header>
  <h1 class="logo"><img src="zmq-arena-logo.svg" alt="zmq-arena — ZMTP benchmark battleground"></h1>
  <div class="sub" id="dataSource">loading…</div>
</header>
<nav class="topnav"><a href="index.html" class="active">Overview</a><a href="explore.html">Explore</a><a href="tables.html">Tables</a></nav>
<div class="banner hidden" id="sampleBanner"></div>

<div class="controls" id="controls" hidden>
  <div class="ctl"><label for="run">Run</label><select id="run"></select></div>
  <div class="ctl"><label>Latency metric</label>
    <div class="seg" id="latpctSeg">
      <button data-v="p50">p50</button><button data-v="p99" class="on">p99</button><button data-v="p999">p99.9</button>
    </div>
  </div>
  <div class="ctl"><label>Throughput unit</label>
    <div class="seg" id="tputSeg">
      <button data-v="msgs" class="on">Mmsg/s</button><button data-v="mbps">MB/s</button>
    </div>
  </div>
  <div class="ctl"><label>Layout</label>
    <div class="seg" id="layoutSeg">
      <button data-v="grid" class="on">Grid</button><button data-v="focus">Focus</button>
    </div>
  </div>
  <div class="ctl"><label>&nbsp;</label><label class="toggle"><input type="checkbox" id="logscale"> log y-axis</label></div>
</div>

<div class="variants" id="variantsBox" hidden>
  <div class="head">
    <span class="ttl">Libraries (click to toggle across all charts)</span>
    <span class="preset" data-preset="all">all</span>
    <span class="preset" data-preset="none">none</span>
    <span class="preset" data-preset="io_uring">io_uring</span>
    <span class="preset" data-preset="epoll">epoll</span>
  </div>
  <div class="chips" id="chips"></div>
</div>

<main id="main" hidden>
  <section class="card">
    <h2>Global ranking</h2>
    <div class="hint" id="rankHint"></div>
    <div id="rankTable"></div>
  </section>
</main>
<div id="panels" hidden></div>

<div class="err" id="err" hidden></div>
<footer id="footer"></footer>

<script>
"use strict";

// ── registries ────────────────────────────────────────────────────
const VARIANT_LABEL = {
  "libzmq":"libzmq (C++)", "rust_zmq":"rust-zmq", "zmq.rs":"zmq.rs", "omq_tokio":"omq-tokio",
  "omq_tokio_mt":"omq-tokio (MT)", "omq_compio":"omq-compio", "omq_compio_st":"omq-compio (ST)",
  "rzmq":"rzmq", "celerity":"celerity", "monocoque":"monocoque", "monocoque_tokio":"monocoque (tokio)",
};
// One stable colour per library so the same line is the same colour in every panel.
const VARIANT_COLOR = {
  "libzmq":"#eab308", "rust_zmq":"#f59e0b", "zmq.rs":"#3b82f6",
  "omq_tokio":"#8b5cf6", "omq_tokio_mt":"#a855f7", "omq_compio":"#c026d3", "omq_compio_st":"#e879f9",
  "rzmq":"#22c55e", "celerity":"#ec4899", "monocoque":"#14b8a6", "monocoque_tokio":"#06b6d4",
};
const colorOf = v => VARIANT_COLOR[v] || "#8892a0";
const KIND_LABEL = { throughput:"Throughput", latency:"Latency", pubsub:"Pub/Sub", fanout:"Fan-out", fanin:"Fan-in" };
const KIND_ORDER = ["throughput","latency","pubsub","fanout","fanin"];
const HAS_PEERS = k => k==="pubsub" || k==="fanout" || k==="fanin";
const TRANSPORT_ORDER = ["tcp_netns","ipc","inproc"];
const TRANSPORT_LABEL = { "tcp_netns":"tcp", "ipc":"ipc", "inproc":"inproc" };
const orderTransports = ts => [...ts].sort((a,b)=>{
  const ia=TRANSPORT_ORDER.indexOf(a), ib=TRANSPORT_ORDER.indexOf(b);
  return (ia<0?99:ia)-(ib<0?99:ib) || a.localeCompare(b); });

const el = id => document.getElementById(id);
const val = id => el(id).value;
const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();

let RECORDS=[], DATES=[], VARIANTS=[], VARMETA={}, selected=new Set(), PANELS=[];
const VORDER = Object.keys(VARIANT_LABEL);
const varSort = (a,b)=>{ const ia=VORDER.indexOf(a), ib=VORDER.indexOf(b);
  return (ia<0?99:ia)-(ib<0?99:ib) || a.localeCompare(b); };

function fmtPayload(b){ return b>=1048576?(b/1048576)+" MiB":b>=1024?(b/1024)+" KiB":b+" B"; }
function fmtMsgs(v){ if(v==null||Number.isNaN(v))return"—";
  if(v>=1e9)return (v/1e9).toFixed(2)+"G"; if(v>=1e6)return (v/1e6).toFixed(2)+"M";
  if(v>=1e3)return (v/1e3).toFixed(0)+"K"; return v.toFixed(0); }

// ── load ──────────────────────────────────────────────────────────
async function fetchJSON(u){ const bust=u+(u.includes("?")?"&":"?")+"_="+Date.now();
  const r=await fetch(bust,{cache:"no-store"}); if(!r.ok) throw new Error(u+" -> "+r.status); return r.json(); }
async function loadFrom(base){
  const m=await fetchJSON(base+"index.json");
  if(!m.runs||!m.runs.length) throw new Error("empty manifest");
  return Promise.all(m.runs.map(async run=>({date:run.date,data:await fetchJSON(base+run.file)})));
}
async function load(){
  let runs, isSample=false;
  try { runs=await loadFrom("history/"); } catch(e){ runs=await loadFrom("sample/"); isSample=true; }
  runs.sort((a,b)=>a.date.localeCompare(b.date));
  RECORDS=[];
  for(const {date,data} of runs) for(const rec of (data.records||[])) RECORDS.push({...rec,date});
  DATES=[...new Set(RECORDS.map(r=>r.date))].sort();
  VARMETA={};
  for(const r of RECORDS) if(!VARMETA[r.variant]) VARMETA[r.variant]={engine:r.engine,io:r.io,threading:r.threading,lib:r.lib_version};
  VARIANTS=[...new Set(RECORDS.map(r=>r.variant))].sort(varSort);
  selected=new Set(VARIANTS);

  const latest=runs[runs.length-1].data, hw=latest.hardware||{};
  el("dataSource").innerHTML=`${RECORDS.length.toLocaleString()} cells · ${VARIANTS.length} libraries · ${DATES.length} run${DATES.length>1?"s":""} · `+
    `<code>${hw.cpu||"unknown host"}</code>${hw.note?" · "+hw.note:""}`;
  if(isSample){ const b=el("sampleBanner"); b.classList.remove("hidden");
    b.innerHTML="<strong>Sample data.</strong> Synthetic numbers for preview only, not measurements. Real weekly-grid results replace them once <code>history/</code> is populated."; }

  el("run").innerHTML="";
  for(const d of DATES){ const o=document.createElement("option"); o.value=d; o.textContent=d; el("run").appendChild(o); }
  el("run").value=DATES[DATES.length-1];
  if(DATES.length<2) el("run").closest(".ctl").style.display="none";

  initControls(); buildChips(); buildPanels(); render();
  el("controls").hidden=false; el("variantsBox").hidden=false; el("main").hidden=false; el("panels").hidden=false;
}

// ── controls ──────────────────────────────────────────────────────
function seg(id, cb){ el(id).querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{
  el(id).querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); cb(b.dataset.v); })); }
function segVal(id){ return el(id).querySelector("button.on").dataset.v; }

function initControls(){
  el("run").addEventListener("change", ()=>{ buildPanels(); render(); });
  seg("latpctSeg", ()=>render());
  seg("tputSeg", ()=>render());
  el("logscale").addEventListener("change", render);
  seg("layoutSeg", applyLayout);
  document.querySelectorAll(".preset").forEach(p=>p.addEventListener("click",()=>applyPreset(p.dataset.preset)));
  window.addEventListener("resize",()=>PANELS.forEach(p=>p.chart.resize()));
}
function applyLayout(mode){
  document.body.classList.toggle("focus", mode==="focus");
  PANELS.forEach(p=>{ p.details.open = (mode==="grid"); });
  setTimeout(()=>PANELS.forEach(p=>{ if(p.details.open) p.chart.resize(); }),0);
}

// ── library chips (shared legend + filter) ────────────────────────
function buildChips(){
  const box=el("chips"); box.innerHTML="";
  for(const v of VARIANTS){
    const m=VARMETA[v]||{};
    const c=document.createElement("span");
    c.className="chip"+(selected.has(v)?" on":""); c.dataset.v=v;
    c.innerHTML=`<span class="sw" style="background:${colorOf(v)}"></span>${VARIANT_LABEL[v]||v}`+
      `${m.lib?` <small>${m.lib}</small>`:""} <small>${m.io}</small>`;
    c.addEventListener("click",()=>{ selected.has(v)?selected.delete(v):selected.add(v);
      c.classList.toggle("on"); render(); });
    box.appendChild(c);
  }
}
function setSelected(vs){ selected=new Set(vs);
  document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on",selected.has(c.dataset.v))); render(); }
function applyPreset(p){
  if(p==="all")  return setSelected(VARIANTS);
  if(p==="none") return setSelected([]);
  if(p==="io_uring"||p==="epoll") return setSelected(VARIANTS.filter(v=>(VARMETA[v]||{}).io===p));
}

// ── metric per kind ───────────────────────────────────────────────
function panelMetric(kind){
  if(kind==="latency"){ const p=segVal("latpctSeg");
    return {get:r=>r.latency_ns[p]/1000, axis:`${p==="p999"?"p99.9":p} latency (µs)`, better:"lower", fmt:v=>v>=100?v.toFixed(0):v.toFixed(1)}; }
  return segVal("tputSeg")==="mbps"
    ? {get:r=>r.throughput.mbps, axis:"MB/s", better:"higher", fmt:v=>v.toFixed(0)}
    : {get:r=>r.throughput.msgs_per_s/1e6, axis:"Mmsg/s", better:"higher", fmt:v=>v.toFixed(2)};
}

// ── scenarios (one panel each) ────────────────────────────────────
function scenarios(){
  const recs=RECORDS.filter(r=>r.date===val("run"));
  const out=[];
  for(const kind of KIND_ORDER){
    const kr=recs.filter(r=>r.kind===kind); if(!kr.length) continue;
    for(const tr of orderTransports(new Set(kr.map(r=>r.transport)))){
      const tcr=kr.filter(r=>r.transport===tr);
      const peers=HAS_PEERS(kind)?[...new Set(tcr.map(r=>r.peers))].filter(p=>p!=null).sort((a,b)=>a-b):[null];
      for(const pe of (peers.length?peers:[null])) out.push({kind,transport:tr,peers:pe});
    }
  }
  return out;
}
const gkey = g => `${g.kind}|${g.transport}|${g.peers}`;

function buildPanels(){
  PANELS.forEach(p=>p.chart.dispose());
  PANELS=[];
  const host=el("panels"); host.innerHTML="";
  const focus = segVal("layoutSeg")==="focus";
  for(const g of scenarios()){
    const d=document.createElement("details"); d.className="panel"; d.open=!focus;
    const s=document.createElement("summary");
    s.innerHTML=`<span class="pt">${KIND_LABEL[g.kind]||g.kind}</span>`+
      `<span class="ps">${TRANSPORT_LABEL[g.transport]||g.transport}${g.peers!=null?` · ${g.peers} peers`:""}</span>`+
      `<span class="caret">▶</span>`;
    const c=document.createElement("div"); c.className="chart";
    d.appendChild(s); d.appendChild(c); host.appendChild(d);
    const chart=echarts.init(c);
    const panel={group:g, chart, details:d};
    d.addEventListener("toggle",()=>{ if(d.open){ chart.resize(); drawPanel(panel); } });
    PANELS.push(panel);
  }
}

function drawPanel(p){
  const g=p.group, m=panelMetric(g.kind);
  const recs=RECORDS.filter(r=>r.date===val("run") && r.kind===g.kind && r.transport===g.transport && (g.peers==null||r.peers===g.peers));
  const sizes=[...new Set(recs.map(r=>r.payload_bytes))].sort((a,b)=>a-b);
  const vars=VORDER.filter(v=>selected.has(v) && recs.some(r=>r.variant===v));
  const logy=el("logscale").checked;
  const series=vars.map(v=>({
    name:VARIANT_LABEL[v]||v, type:"line", symbol:"circle", symbolSize:5, smooth:false, connectNulls:true,
    lineStyle:{width:2,color:colorOf(v)}, itemStyle:{color:colorOf(v)},
    data:sizes.map(s=>{ const r=recs.find(x=>x.payload_bytes===s&&x.variant===v); return [s, r?m.get(r):null]; }),
  }));
  p.chart.setOption({
    color:vars.map(colorOf),
    textStyle:{color:css("--fg"),fontFamily:"system-ui,sans-serif"},
    grid:{left:58,right:16,top:14,bottom:34},
    tooltip:{trigger:"axis", backgroundColor:css("--panel2"), borderColor:css("--line"),
      textStyle:{color:css("--fg")},
      formatter:pts=>{ const s=fmtPayload(pts[0].value[0]); const better=m.better;
        const rows=pts.filter(p=>p.value[1]!=null).sort((a,b)=>better==="lower"?a.value[1]-b.value[1]:b.value[1]-a.value[1])
          .map(p=>`${p.marker}${p.seriesName}: <b>${m.fmt(p.value[1])}</b>`);
        return `<b>${s}</b><br>${rows.join("<br>")}`; }},
    xAxis:{type:"log", axisLabel:{color:css("--muted"),formatter:v=>fmtPayload(v)},
      axisLine:{lineStyle:{color:css("--line")}}, splitLine:{show:false}},
    yAxis:{type:logy?"log":"value", name:m.axis, nameTextStyle:{color:css("--muted"),align:"left"},
      axisLabel:{color:css("--muted")}, splitLine:{lineStyle:{color:css("--line"),opacity:.5}}},
    series,
  }, true);
}

// ── global ranking (mean rank across scenarios, selected libs) ────
function primary(r){ if(r.latency_ns) return {v:r.latency_ns.p99, lower:true};
  if(r.throughput) return {v:r.throughput.msgs_per_s, lower:false}; return null; }
function renderGlobalRanking(){
  const run=val("run");
  const recs=RECORDS.filter(r=>r.date===run && selected.has(r.variant) && primary(r));
  const groups={};
  for(const r of recs){ const k=`${r.kind}|${r.transport}|${r.payload_bytes}|${r.peers}`; (groups[k]=groups[k]||[]).push(r); }
  const ranks={}, foot={};
  for(const k in groups){ const g=groups[k], lower=primary(g[0]).lower;
    g.sort((a,b)=>lower?primary(a).v-primary(b).v:primary(b).v-primary(a).v);
    g.forEach((r,i)=>{ (ranks[r.variant]=ranks[r.variant]||[]).push(i+1); }); }
  for(const r of recs){ (foot[r.variant]=foot[r.variant]||[]).push(r); }
  const mean=(a,f)=>a.length?a.reduce((s,x)=>s+f(x),0)/a.length:null;
  const rows=Object.keys(ranks).map(v=>({v,
    mean:ranks[v].reduce((a,b)=>a+b,0)/ranks[v].length, n:ranks[v].length,
    cpu:mean(foot[v]||[],r=>r.cpu_seconds), mem:mean(foot[v]||[],r=>r.peak_memory_bytes/1e6)}));
  rows.sort((a,b)=>a.mean-b.mean);
  el("rankHint").textContent=`Run ${run} · mean rank across ${Object.keys(groups).length} benchmarks over ${rows.length} libraries (lower is better; latency and throughput count equally). CPU and memory are the mean footprint across all of a cell's processes.`;
  let h=`<table><thead><tr><th>#</th><th>Library</th><th>lib</th><th>mean rank</th><th>benchmarks</th><th>CPU (s)</th><th>Mem (MB)</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{ const meta=VARMETA[r.v]||{};
    h+=`<tr class="${i===0?"rank1":""}"><td>${i+1}</td>`+
      `<td><span class="sw2" style="background:${colorOf(r.v)}"></span>${VARIANT_LABEL[r.v]||r.v} <small>${meta.io}·${meta.threading}</small></td>`+
      `<td><small>${meta.lib||"—"}</small></td>`+
      `<td>${r.mean.toFixed(2)}</td><td>${r.n}</td>`+
      `<td>${r.cpu==null?"—":r.cpu.toFixed(3)}</td><td>${r.mem==null?"—":r.mem.toFixed(1)}</td></tr>`;
  });
  h+="</tbody></table>";
  if(!rows.length) h=`<div class="hint">Select libraries to rank.</div>`;
  el("rankTable").innerHTML=h;
}

function render(){
  renderGlobalRanking();
  PANELS.forEach(p=>{ if(p.details.open) drawPanel(p); });
}
